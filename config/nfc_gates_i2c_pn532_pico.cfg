# =============================================================================
# EMU NFC Gate Reader — Hardware Configuration (I2C / PN532 / Pico)
# =============================================================================
# Use this config when you have PN532 modules wired to a dedicated Raspberry
# Pi Pico over I2C — NOT to EBB42 lane boards.
#
# Use nfc_gate_i2c_pn532.cfg instead if your PN532 modules are wired to
# EBB42 lane boards.  The two configs are mutually exclusive.
#
# Include BOTH files from printer.cfg:
#   [include nfc_vars.cfg]          ← user settings (Spoolman URL etc.)
#   [include nfc_macros.cfg]
#   [include nfc_gates_i2c_pn532_pico.cfg]
#
# Integration model — UID lookup
# ────────────────────────────────────────────
# Tags are NEVER written to.  Stick any blank 13.56 MHz NFC tag on each spool.
# For each spool, read its tag UID with your phone and paste it into the "rfid"
# extra field on the matching Spoolman spool record.
# See docs/shared/spoolman-integration.md for step-by-step instructions.
#
# Required install steps (do these once):
#   1. Clone the repo and run install.sh — see Readme.md for the one-liner.
#   2. Flash standard Klipper MCU firmware to the Pico with CAN bus support
#      (see docs/spi-rc522/setup.md for make menuconfig settings — same Pico
#       firmware regardless of whether you use SPI or I2C readers).
#   3. Find the Pico's CAN UUID and fill in canbus_uuid below:
#        ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0
#   4. Wire PN532 modules to the Pico I2C bus — see docs/i2c-pn532/wiring.md.
#   5. Set each PN532 to I2C mode (onboard DIP switch or solder jumper).
#   6. Set unique I2C addresses for each reader (see PN532 address note below).
#   7. Fill in gate_i2c_addresses below to match.
#   8. Set your Spoolman URL in nfc_vars.cfg.
#   9. Restart Klipper:  sudo systemctl restart klipper
#
# PN532 I2C address note
# ──────────────────────
# In I2C mode the PN532's address is set by two ADDR pins (A0, A1):
#
#   A1=0  A0=0  →  0x24  (default — most modules ship with both low)
#   A1=0  A0=1  →  0x25
#   A1=1  A0=0  →  0x26
#   A1=1  A0=1  →  0x27
#
# Not all breakout boards expose these pins.  If yours does not, all readers
# will share the same address (0x24) and MUST be on different I2C buses.
# The Pico has two hardware I2C buses (i2c0, i2c1).  For more than 2 readers
# with non-addressable modules, use PN532 modules that expose ADDR pins.
#
# Driver:   pn532_driver.PN532Driver  (ISO14443A via InListPassiveTarget)
# Manager:  NfcGateManager (one shared thread, sequential gate polling)
# Macros:   nfc_macros.cfg (shared with all paths — include separately)
# =============================================================================


# -----------------------------------------------------------------------------
# [mcu nfc_pico] — Raspberry Pi Pico as a CAN bus MCU
# -----------------------------------------------------------------------------
# Firmware build settings (make menuconfig) — same as SPI/RC522 Pico path:
#   Micro-controller:        Raspberry Pi RP2040
#   Communication interface: CAN bus
#   CAN TX GPIO:             4   (SN65HVD230 CAN transceiver)
#   CAN RX GPIO:             5   (SN65HVD230 CAN transceiver)
#   CAN bus speed:           1000000
# -----------------------------------------------------------------------------
[mcu nfc_pico]
canbus_uuid: YOUR_UUID_HERE


# -----------------------------------------------------------------------------
# [nfc_gates] — PN532 readers over I2C on the Pico
# -----------------------------------------------------------------------------
# gate_i2c_addresses tells the manager to use the I2C/PN532 path.
# Without this key the manager falls back to SPI/RC522 mode.
#
# List one address per gate, in gate order (gate 0 first), comma-separated.
# Addresses can be decimal (36) or hex (0x24) — both are accepted.
#
# Example: 4 readers with unique addresses on a single I2C bus
#   gate 0 → PN532 at 0x24  (A1=0, A0=0)
#   gate 1 → PN532 at 0x25  (A1=0, A0=1)
#   gate 2 → PN532 at 0x26  (A1=1, A0=0)
#   gate 3 → PN532 at 0x27  (A1=1, A0=1)
#
# Pico I2C0 hardware pins (default):
#   SCL = GP1    SDA = GP0
# Pico I2C1 hardware pins:
#   SCL = GP3    SDA = GP2   (or GP7/GP6 — check RP2040 GPIO mux table)
# -----------------------------------------------------------------------------
[nfc_gates]

# I2C bus on the Pico — defines SCL/SDA pins for the primary I2C bus
i2c_mcu:   nfc_pico
i2c_bus:   i2c0         # hardware I2C0: SCL=GP1, SDA=GP0

# One address per gate, in gate order.
# Adjust to match the ADDR pin settings on your PN532 modules.
gate_i2c_addresses: 0x24, 0x25, 0x26, 0x27

# I2C speed — 400 kHz is standard fast-mode; reduce to 100000 if unstable
i2c_speed: 400000

# ── User settings ─────────────────────────────────────────────────────────────
# Spoolman URL, polling, thresholds, and debug level are set in nfc_vars.cfg.
# Copy any key here only if you need a value that differs from nfc_vars.cfg.
#
# Defaults (from nfc_vars.cfg):
#   spoolman_url      http://mainsailos.local:7912
#   spoolman_rfid_key rfid
#   poll_interval     30
#   absent_threshold  3
#   debug             1
#
# PN532 I2C timing (shared with EBB42 path, set in nfc_vars.cfg):
#   transceive_delay  0.250   — wait after InListPassiveTarget command
#   crc_delay         0.050   — wait after InRelease command
