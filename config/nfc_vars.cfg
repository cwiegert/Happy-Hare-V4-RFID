# =============================================================================
# EMU NFC Gate Reader — User Settings
# =============================================================================
# This is the ONE file you need to edit for your installation.
# Hardware-specific pin/MCU settings stay in the hardware config you chose:
#
#   SPI / RC522 path  →  nfc_gates_spi_rc522.cfg
#   I2C / PN532 path  →  nfc_gate_i2c_pn532.cfg
#
# Include order in printer.cfg:
#   [include nfc_vars.cfg]
#   [include nfc_macros.cfg]
#   [include nfc_gates_spi_rc522.cfg]   ← pick one hardware config
#   OR
#   [include nfc_gate_i2c_pn532.cfg]
# =============================================================================


# =============================================================================
# Shared defaults — I2C / PN532 path
# =============================================================================
# The [nfc_gate] section (no lane name) sets defaults inherited by every
# [nfc_gate laneN] section.  Lane sections can override any key locally.
#
# SPI / RC522 path users: the equivalent settings live directly inside the
# [nfc_gates] section in nfc_gates_spi_rc522.cfg — copy any changes you
# make here into that file as well.
# =============================================================================

[nfc_gate]

# ── Spoolman ──────────────────────────────────────────────────────────────────
# REQUIRED: URL of your Spoolman instance.
# Common values:
#   http://mainsailos.local:7912       (MainsailOS default hostname)
#   http://192.168.1.50:7912           (static IP)
spoolman_url:        http://mainsailos.local:7912

# Name of the extra field in Spoolman that holds the tag UID.
# Must match the field name you created in Settings → Extra fields → Spool.
spoolman_rfid_key:   rfid_tag

# HTTP request timeout in seconds.
# spoolman_timeout:    5.0

# Seconds to cache a successful UID→spool_id mapping (0 = disable cache).
# Cached entries skip the Spoolman API call when the same tag is still present.
# spoolman_cache_ttl:  300

# ── Polling ───────────────────────────────────────────────────────────────────
# How often (seconds) to scan all gates.
poll_interval:       30

# Consecutive missed polls before a spool is declared removed.
# At poll_interval=30 s: 3 misses ≈ 90 s of absence before REMOVED fires.
absent_threshold:    3

# ── Hardware timing ───────────────────────────────────────────────────────────
# Seconds to wait after InListPassiveTarget before reading the PN532 response.
# 250 ms covers the PN532's no-tag scan timeout plus CAN round-trip latency.
# RC522 equivalent setting is transceive_delay in nfc_gates_spi_rc522.cfg.
# transceive_delay:    0.250

# Seconds to wait after InRelease (PN532) before the next command.
# crc_delay:           0.050

# ── Logging ───────────────────────────────────────────────────────────────────
# Verbosity written to klippy.log.
#   0 — errors and warnings only
#   1 — major events: tag detected/removed, Spoolman lookups          (default)
#   2 — full trace: every I2C frame, UID parse, cache hit/miss
debug:               1
