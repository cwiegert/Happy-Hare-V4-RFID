# =============================================================================
# EMU NFC Gate Reader — Hardware Configuration (SPI / RC522)
# =============================================================================
# Include BOTH files from printer.cfg:
#   [include nfc_macros.cfg]
#   [include nfc_gates_spi_rc522.cfg]
#
# Integration model — UID lookup (Approach B)
# ────────────────────────────────────────────
# Tags are NEVER written to.  Stick any blank 13.56 MHz NFC tag on each spool.
# For each spool, read its tag UID with your phone and paste it into the "rfid"
# extra field on the matching Spoolman spool record.
# See docs/shared/spoolman-integration.md for step-by-step instructions.
#
# Required install steps (do these once):
#   1. Clone the repo and run install.sh — see Readme.md for the one-liner.
#   2. Flash standard Klipper MCU firmware to the Pico with CAN bus support
#      (see docs/spi-rc522/setup.md for make menuconfig settings)
#   3. Find the Pico's CAN UUID and fill in canbus_uuid below:
#        ~/klippy-env/bin/python ~/klipper/scripts/canbus_query.py can0
#   4. Set up the Spoolman "rfid" extra field — see docs/shared/spoolman-integration.md.
#   5. Fill in your Spoolman URL below.
#   6. Restart Klipper:  sudo systemctl restart klipper
#
# Interface: SPI — one RC522 module per gate, CS pins on RP2040 GPIOs
# Driver:    rc522_driver.RC522Driver (ISO14443A / REQA → ANTICOLL only)
# Macros:    nfc_macros.cfg (shared with I2C path — include separately)
# =============================================================================


# -----------------------------------------------------------------------------
# [mcu nfc_pico] — Raspberry Pi Pico as a CAN bus MCU
# -----------------------------------------------------------------------------
# Firmware build settings (make menuconfig):
#   Micro-controller:        Raspberry Pi RP2040
#   Communication interface: CAN bus
#   CAN TX GPIO:             4   (SN65HVD230 CAN transceiver)
#   CAN RX GPIO:             5   (SN65HVD230 CAN transceiver)
#   CAN bus speed:           1000000
#
# Flash via USB (hold BOOTSEL while connecting):
#   make flash FLASH_DEVICE=/dev/sda1
# -----------------------------------------------------------------------------
[mcu nfc_pico]
canbus_uuid: YOUR_UUID_HERE


# -----------------------------------------------------------------------------
# [nfc_gates] — RC522 readers over SPI1
# -----------------------------------------------------------------------------
# Hardware SPI1 on the RP2040 uses fixed silicon pin functions:
#   SCK  = GP10    MOSI = GP11    MISO = GP8
# Each RC522 gets its own CS (chip-select) GPIO.
#
# Gate 0: cs_pin = gpio0
# Gate 1: cs_pin = gpio1   (add to extra_cs_pins)
# Gate 2: cs_pin = gpio2   ...
# Gate 3: cs_pin = gpio3
# Gate 4: cs_pin = gpio6   (gpio4/5 reserved for CAN TX/RX)
# -----------------------------------------------------------------------------
[nfc_gates]

# Gate 0 CS — also selects the SPI bus for all gates
cs_pin:  nfc_pico:gpio0
spi_bus: spi1
spi_speed: 1000000          # 1 MHz — reliable over jumper wires

# Additional gate CS pins (gates 1–N), comma-separated.
# Remove entries to match your physical wiring (minimum: 1 gate total).
extra_cs_pins: nfc_pico:gpio1, nfc_pico:gpio2, nfc_pico:gpio3, nfc_pico:gpio6

# ── User settings ────────────────────────────────────────────────────────────
# Spoolman URL, polling, thresholds, timing, and debug level are set in
# nfc_vars.cfg.  Copy the values you want to override here if you need
# SPI-path-specific values that differ from nfc_vars.cfg.
#
# Defaults (from nfc_vars.cfg):
#   spoolman_url      http://mainsailos.local:7912
#   spoolman_rfid_key rfid
#   poll_interval     30
#   absent_threshold  3
#   debug             1
#
# RC522-specific timing (not in nfc_vars.cfg — RC522 only):
# Seconds to wait after TRANSCEIVE before reading the result.
# RC522 timer fires at ~0.5 ms when no tag; tags respond in <2 ms.
# 35 ms is conservative and covers CAN bus round-trip latency.
transceive_delay: 0.035
